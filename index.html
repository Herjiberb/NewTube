<!DOCTYPE html>

    <title>NewTube Nexus | Focus & Learn</title>
    <!-- Dynamic Favicon Link -->
    <link id="favicon" rel="icon" type="image/svg+xml" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        industrial: {
                            950: '#06090e',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            400: '#94a3b8',
                            accent: '#0ea5e9', // Cool cyan/blue
                            highlight: '#f8fafc'

    <style>
        body {
            background-color: #06090e;
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02), transparent 25%);
        }
        
        /* Custom Scrollbar for Industrial Look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #06090e; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Card Animations & Glassmorphism */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-card {
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }
        .video-card.loaded {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .video-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.15);
        }

        /* Stats Bars */
        .stat-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Pulse for Active AI */
        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .ai-processing::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, #0ea5e9, transparent);
            animation: scanline 2s linear infinite;
            pointer-events: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

    <script>
        // --- DATA LAYER: Ultra-compact format for easy expansion ---
        // Format: [YouTube ID, Title, Creator, Tags (comma separated)]
        const rawVideoData = [
            // Original List

            ['oUpf7dEHv50', 'Clutch - The Mob Goes Wild', 'Clutch', 'Music,Rock,Groove,Live'],
            ['dxa9xqe4UNA', 'Clutch - Slaughter Beach', 'Clutch', 'Music,Rock,Stoner,Blues'],
            ['BZ7IEWwQ4Cg', 'The Guys Who Invented Q-Tips', 'Ryan George', 'Comedy,Sketch,Inventions,Humor'],
            ['L3tLFdrmHRw', 'The Uncle Who Can\'t Spot AI', 'Ryan George', 'Comedy,Sketch,AI,Humor'],
            ['fg0a7iZLl1s', 'The First Guy To Ever Swear', 'Ryan George', 'Comedy,Sketch,History,Humor'],
            ['hJ3L5tMq5oc', 'Demon Hunter - I\'m Done', 'Demon Hunter', 'Music,Metal,Christian,Heavy'],
            ['pPJyAIbnWlU', 'Hytale Update 4 is HUGE', 'Kweebec Corner', 'Hytale,Gaming,Updates,News'],
            ['ld_8zROYDzw', 'Forget Q-Tips — Here’s How You Should Be Cleaning Your Ears', 'Business Insider', 'Health,Science,Educational,Lifehack'],
            
            // EXPANDED LIST
            ['F1Hq8eVOMHs', 'Building a modern web app with no frameworks', 'Fireship', 'Coding,Web,Development,Tech'],
            ['lkIFF4maKMU', '100+ Web Development Things you Should Know', 'Fireship', 'Coding,Web,Education,Tech'],
            ['bMknfKXIFA8', 'React Course - Beginner\'s Tutorial', 'freeCodeCamp', 'Coding,React,Education,Tutorial'],
            ['8hly31xKli0', 'Algorithms and Data Structures Tutorial', 'freeCodeCamp', 'Coding,Algorithms,Education,Computer Science'],
            ['v64KOxKVLVg', 'The history of the world according to cats', 'TED-Ed', 'Education,History,Animation,Science'],
            ['UoBOJwX_t3Q', 'Why do we dream? - Amy Adkins', 'TED-Ed', 'Education,Science,Animation,Brain'],
            ['T-D1KVIuvjA', 'The paradox of value - Akshita Agarwal', 'TED-Ed', 'Education,Economics,Animation,Science'],
            ['M5QY2_8704o', '100 Days Building a Modern Underground Hut', 'Mr. Heang Update', 'Building,Survival,Bushcraft,Nature'],
            ['dQw4w9WgXcQ', 'Rick Astley - Never Gonna Give You Up', 'Rick Astley', 'Music,Pop,Classic,Meme'],
            ['fJ9rUzIMcZQ', 'Bohemian Rhapsody - Queen', 'Queen Official', 'Music,Rock,Classic,Legend'],
            ['hHW1oY26kxQ', 'The Complete Cyberpunk 2077 Timeline', 'The Leaderboard', 'Gaming,Cyberpunk,Lore,Story'],
            ['S8b1zWOgOKA', 'The Outer Wilds is a Masterpiece', 'Skill Up', 'Gaming,Review,Essay,Masterpiece'],
            ['sB_IG8lF3E0', 'Hollow Knight: The Making of a Masterpiece', 'mossbag', 'Gaming,Hollow Knight,Lore,Indie'],
            ['9P6rdqiybaw', 'I Built a Keyboard that Types using WATER', 'Glarses', 'Tech,Keyboard,Comedy,Hardware'],
            ['y8OnoxKotPQ', 'I bought the cheapest PC on Amazon', 'Dawid Does Tech Stuff', 'Tech,PC,Comedy,Hardware'],
            ['86BowNRrobs', 'The Most Baffling Mystery in Speedrunning', 'Karl Jobst', 'Gaming,Speedrun,Mystery,History'],
            ['4Zqx2GkiqfM', 'The 100 Hour Goldeneye 007 Speedrun Mystery', 'Karl Jobst', 'Gaming,Speedrun,Mystery,History'],
            ['VZMfhtKa-wo', 'I coded a game using ONLY physics', 'Dani', 'Coding,GameDev,Comedy,Unity'],
            ['WZhjjnycgWE', 'I made a Multiplayer Game in 10 Minutes', 'Dani', 'Coding,GameDev,Multiplayer,Unity'],
            ['O5ND2W1tVfU', 'Elden Ring - Official Gameplay Reveal', 'BANDAI NAMCO', 'Gaming,Elden Ring,Trailer,RPG'],
            ['jNQXAC9IVRw', 'Me at the zoo', 'jawed', 'History,Vlog,YouTube,Classic'],
            ['6ZfuNTqbHE8', 'Marvel Studios\' Avengers: Infinity War Trailer', 'Marvel Entertainment', 'Movie,Trailer,Marvel,Action']
        ];

        // Parse to structured objects
        const videoDB = rawVideoData.map(v => ({
            id: v[0],
            title: v[1],
            creator: v[2],
            tags: v[3].split(','),
            searchString: `${v[1]} ${v[2]} ${v[3]}`.toLowerCase()
        }));

        // --- CORE STATE ---
        let currentDisplayCount = 12;
        let activeSearchQuery = '';
        let activeTagFilter = '';
        let activeTheaterVideo = null;
        
        // AI Vector Profile (Pre-calculated for speed)
        let userVector = {
            creators: {},
            tags: {},
            totalRatings: 0
        };

        // --- PROCEDURAL GENERATION ---
        
        // Setup Favicon using SVG string
        function setupFavicon() {
            const svgContent = document.getElementById('app-logo').outerHTML
                .replace('class="hidden"', '')
                .replace('xmlns="http://www.w3.org/2000/svg"', 'xmlns="http://www.w3.org/2000/svg" width="100" height="100"');
            const encoded = encodeURIComponent(svgContent);
            document.getElementById('favicon').href = `data:image/svg+xml,${encoded}`;
            document.getElementById('logo-container').innerHTML = svgContent;
        }

        // Generate safe, readable background color based on string hash
        function getStringColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash) % 360;
            // Saturation 60-80%, Lightness 20-35% for contrast with white text
            const s = 60 + (Math.abs(hash) % 20);
            const l = 20 + (Math.abs(hash) % 15);
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // --- AI & RECOMMENDATION LOGIC ---

        function computeUserVector() {
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            userVector = { creators: {}, tags: {}, totalRatings: history.length };
            
            // Weight recent items more heavily (Decay algorithm)
            history.forEach((entry, index) => {
                const age = index; // 0 is newest
                const decayFactor = Math.max(0.2, 1 - (age * 0.02)); // Slow decay down to 20% impact
                const impact = entry.rating * decayFactor;

                // Accumulate creator weights
                userVector.creators[entry.creator] = (userVector.creators[entry.creator] || 0) + impact * 2.0;

                // Accumulate tag weights
                entry.tags.forEach(tag => {
                    userVector.tags[tag] = (userVector.tags[tag] || 0) + impact * 1.0;
                });
            });

            updateAlgoStatus();
            renderDashboardStats();
        }

        function calculateFastScore(video) {
            // O(1) lookups thanks to pre-computed vector
            let score = 0;
            
            // Base randomness to keep feed fresh (0 to 1.5)
            score += Math.random() * 1.5;

            if (userVector.totalRatings === 0) return score; // Random feed for new users

            // Creator match
            score += (userVector.creators[video.creator] || 0);

            // Tag match sum
            for(let i=0; i<video.tags.length; i++) {
                score += (userVector.tags[video.tags[i]] || 0);
            }

            return score;
        }

        function updateAlgoStatus() {
            const ind = document.getElementById('algo-indicator');
            const status = document.getElementById('algo-status');
            
            if (userVector.totalRatings === 0) {
                ind.className = "w-1.5 h-1.5 bg-industrial-700 rounded-full mr-2";
                status.innerText = "Engine Idle";
            } else {
                ind.className = "w-1.5 h-1.5 bg-industrial-accent rounded-full mr-2 shadow-[0_0_8px_rgba(14,165,233,0.8)]";
                status.innerText = `Matrix Active (${userVector.totalRatings} nodes)`;
            }
        }

        // --- UI RENDERING ---

        function extractTopTags() {
            const tagSet = new Set();
            videoDB.forEach(v => v.tags.forEach(t => tagSet.add(t)));
            const container = document.getElementById('tag-filters');
            
            // Create "All" pill
            let html = `<button onclick="setTagFilter('')" class="shrink-0 px-4 py-1.5 rounded-full text-xs font-mono transition-colors border ${activeTagFilter === '' ? 'bg-white text-black border-white' : 'bg-industrial-800/50 text-industrial-400 border-white/10 hover:bg-industrial-800'}">All Matrix</button>`;
            
            // Create pills for top 15 tags randomly to keep UI clean, or popular ones
            Array.from(tagSet).sort().slice(0, 20).forEach(tag => {
                const isActive = activeTagFilter === tag;
                html += `<button onclick="setTagFilter('${tag}')" class="shrink-0 px-4 py-1.5 rounded-full text-xs font-mono transition-colors border ${isActive ? 'bg-industrial-accent text-white border-industrial-accent' : 'bg-industrial-800/50 text-industrial-400 border-white/10 hover:bg-industrial-800'}">${tag}</button>`;
            });
            container.innerHTML = html;
        }

        function setTagFilter(tag) {
            activeTagFilter = tag;
            currentDisplayCount = 12;
            extractTopTags(); // Re-render active state
            renderFeed(true);
        }

        function handleSearch(val) {
            activeSearchQuery = val.toLowerCase();
            currentDisplayCount = 12;
            renderFeed(true);
        }

        function forceRefresh() {
            currentDisplayCount = 12;
            renderFeed(true);
        }

        function renderFeed(reset = false) {
            const grid = document.getElementById('video-grid');
            if (reset) {
                grid.innerHTML = '';
                document.documentElement.scrollTop = 0;
            }

            // 1. Filter
            let view = videoDB.filter(v => {
                const matchesSearch = !activeSearchQuery || v.searchString.includes(activeSearchQuery);
                const matchesTag = !activeTagFilter || v.tags.includes(activeTagFilter);
                return matchesSearch && matchesTag;
            });

            // 2. Sort computationally fast
            view.sort((a, b) => calculateFastScore(b) - calculateFastScore(a));

            // 3. Render Batch
            const batch = view.slice(0, currentDisplayCount);
            
            batch.forEach((v, idx) => {
                if (!document.getElementById(`vid-${v.id}`)) {
                    const card = document.createElement('div');
                    card.id = `vid-${v.id}`;
                    card.className = "video-card bg-industrial-900 rounded-2xl overflow-hidden cursor-pointer group border border-white/5 flex flex-col";
                    card.onclick = () => openTheater(v);
                    
                    const creatorColor = getStringColor(v.creator);
                    const isHighMatch = calculateFastScore(v) > 3;

                    card.innerHTML = `
                        <div class="relative aspect-video bg-black overflow-hidden">
                            <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition duration-700" 
                                 onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'">
                            ${isHighMatch ? `<div class="absolute top-2 right-2 bg-industrial-accent/90 backdrop-blur text-white px-2 py-1 rounded text-[9px] font-mono font-bold uppercase shadow-lg shadow-industrial-accent/20">High Match</div>` : ''}
                            <div class="absolute inset-0 bg-gradient-to-t from-industrial-900 via-transparent to-transparent opacity-90"></div>
                            
                            <!-- Play Icon overlay -->
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="w-12 h-12 bg-industrial-accent/90 backdrop-blur rounded-full flex items-center justify-center shadow-xl shadow-industrial-accent/30 translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                                    <svg class="w-5 h-5 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-bold text-[15px] leading-tight mb-3 text-industrial-50 group-hover:text-industrial-accent transition-colors line-clamp-2">${v.title}</h3>
                            <div class="mt-auto">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shadow-inner" style="background-color: ${creatorColor};">${v.creator.charAt(0).toUpperCase()}</span>
                                    <span class="text-xs text-industrial-400 font-medium truncate">${v.creator}</span>
                                </div>
                                <div class="flex flex-wrap gap-1.5">
                                    ${v.tags.slice(0,3).map(t => `<span class="px-2 py-0.5 bg-industrial-800/80 rounded text-[10px] text-industrial-400 font-mono border border-white/5">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                    
                    // Stagger animation
                    setTimeout(() => card.classList.add('loaded'), 50 * (idx % 12));
                }
            });

            // Toggle scroll anchor visibility
            const anchor = document.getElementById('scroll-anchor');
            if (currentDisplayCount < view.length) {
                anchor.classList.remove('opacity-0');
            } else {
                anchor.classList.add('opacity-0');
            }
        }

        // --- PRODUCTIVITY: THEATER & NOTES ---

        function openTheater(video) {
            activeTheaterVideo = video;
            const modal = document.getElementById('theater-modal');
            const iframe = document.getElementById('theater-frame');
            const title = document.getElementById('theater-title');
            const notes = document.getElementById('theater-notes');
            
            // Prevent document scrolling
            document.body.style.overflow = 'hidden';
            
            // Set data
            title.innerText = video.title;
            // Use youtube-nocookie and minimal UI parameters
            iframe.src = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&modestbranding=1`;
            
            // Load notes
            const savedNotes = localStorage.getItem(`newtube_notes_${video.id}`);
            notes.value = savedNotes || '';

            // Reset local rating UI
            document.querySelectorAll('.t-rate-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-industrial-accent', 'bg-industrial-800');
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeTheater() {
            const modal = document.getElementById('theater-modal');
            const iframe = document.getElementById('theater-frame');
            
            saveNotes(); // Auto-save on close
            
            iframe.src = ''; // Stop playback
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            activeTheaterVideo = null;
            document.body.style.overflow = '';
        }

        function saveNotes() {
            if (!activeTheaterVideo) return;
            const text = document.getElementById('theater-notes').value;
            if (text.trim() === '') {
                localStorage.removeItem(`newtube_notes_${activeTheaterVideo.id}`);
            } else {
                localStorage.setItem(`newtube_notes_${activeTheaterVideo.id}`, text);
            }
            
            // Visual feedback
            const btn = document.querySelector('button[onclick="saveNotes()"]');
            const oldTxt = btn.innerText;
            btn.innerText = "Saved ✓";
            btn.classList.add('text-green-400');
            setTimeout(() => {
                btn.innerText = oldTxt;
                btn.classList.remove('text-green-400');
            }, 2000);
        }

        function theaterRate(rating) {
            if (!activeTheaterVideo) return;

            // Update UI
            const btns = document.querySelectorAll('.t-rate-btn');
            btns.forEach(b => b.classList.remove('ring-2', 'ring-industrial-accent', 'scale-110'));
            
            // Quick map rating to button index (0 = -2, 1 = 0, 2 = 2)
            let btnIndex = 1;
            if(rating < 0) btnIndex = 0;
            if(rating > 0) btnIndex = 2;
            
            btns[btnIndex].classList.add('ring-2', 'ring-industrial-accent', 'scale-110');

            // Save to neural history
            const entry = {
                id: activeTheaterVideo.id,
                title: activeTheaterVideo.title,
                creator: activeTheaterVideo.creator,
                tags: activeTheaterVideo.tags,
                rating: rating,
                timestamp: new Date().toISOString()
            };

            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            history.unshift(entry);
            // Cap history to prevent infinite bloat
            if (history.length > 500) history.length = 500;
            
            localStorage.setItem('newtube_nexus_history', JSON.stringify(history));
            
            // Recompute AI weights in background
            computeUserVector();
        }

        // --- DASHBOARD & STATS ---

        function toggleDashboard() {
            const modal = document.getElementById('dashboard-modal');
            if (modal.classList.contains('hidden')) {
                renderDashboardStats();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderDashboardStats() {
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            const historyList = document.getElementById('history-list');
            
            // Render History Items
            historyList.innerHTML = history.slice(0, 20).map(item => `
                <div class="p-3 bg-industrial-950 rounded-lg border border-white/5 flex items-center justify-between group">
                    <div class="overflow-hidden pr-4">
                        <p class="text-xs text-white truncate">${item.title}</p>
                        <p class="text-[10px] font-mono text-industrial-400 uppercase">${item.creator} • ${new Date(item.timestamp).toLocaleDateString()}</p>
                    </div>
                    <div class="text-xl shrink-0 opacity-80 group-hover:opacity-100 transition-opacity">
                        ${item.rating > 0 ? '🔥' : (item.rating < 0 ? '👎' : '😐')}
                    </div>
                </div>
            `).join('');

            if (history.length === 0) return;

            // Render Tag Bars
            const sortedTags = Object.entries(userVector.tags)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);
            
            const maxTag = sortedTags[0]?.[1] || 1;

            document.getElementById('stats-tags').innerHTML = sortedTags.map(([tag, score]) => {
                const pct = Math.max(5, (score / maxTag) * 100);
                return `
                <div>
                    <div class="flex justify-between text-[10px] font-mono text-industrial-400 mb-1">
                        <span>${tag}</span>
                        <span>${score.toFixed(1)}w</span>
                    </div>
                    <div class="h-1.5 w-full bg-industrial-950 rounded-full overflow-hidden">
                        <div class="h-full bg-industrial-accent stat-bar-fill rounded-full" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            }).join('');

            // Render Creator Bars
            const sortedCreators = Object.entries(userVector.creators)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 4);
            
            const maxCreator = sortedCreators[0]?.[1] || 1;

            document.getElementById('stats-creators').innerHTML = sortedCreators.map(([creator, score]) => {
                const pct = Math.max(5, (score / maxCreator) * 100);
                return `
                <div>
                    <div class="flex justify-between text-[10px] font-mono text-industrial-400 mb-1">
                        <span>${creator}</span>
                    </div>
                    <div class="h-1.5 w-full bg-industrial-950 rounded-full overflow-hidden">
                        <div class="h-full bg-purple-500 stat-bar-fill rounded-full" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function clearHistory() {
            if (confirm('Wipe neural data? This resets recommendations but keeps your local notes.')) {
                localStorage.removeItem('newtube_nexus_history');
                computeUserVector();
                renderDashboardStats();
                forceRefresh();
            }
        }

        // --- INIT & EVENT LISTENERS ---

        // Infinite Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentDisplayCount < videoDB.length) {
                currentDisplayCount += 8;
                renderFeed();
            }
        }, { threshold: 0.1 });

        // Escape to close theater/dashboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('theater-modal').classList.contains('hidden')) {
                    closeTheater();
                } else if (!document.getElementById('dashboard-modal').classList.contains('hidden')) {
                    toggleDashboard();
                }
            }
        });

        window.onload = () => {
            setupFavicon();
            computeUserVector();
            extractTopTags();
            renderFeed(true);
            observer.observe(document.getElementById('scroll-anchor'));
        };

    </script>
</body>
</html>
