    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        industrial: {
                            950: '#06090e',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            400: '#94a3b8',

    <style>
        body {
            background-color: #06090e;
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02), transparent 25%);
        }
        
        /* Custom Scrollbar for Industrial Look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #06090e; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Card Animations & Glassmorphism */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-card {
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }
        .video-card.loaded {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .video-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.15);
        }

        /* Stats Bars */
        .stat-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Pulse for Active AI */
        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .ai-processing::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, #0ea5e9, transparent);
            animation: scanline 2s linear infinite;
            pointer-events: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

        // Parse to structured objects & Pre-calculate temporal metadata for performance
        const NOW = Date.now();
        const MS_PER_DAY = 1000 * 60 * 60 * 24;

        const videoDB = rawVideoData.map(v => {
            const releaseDate = v[4] ? new Date(v[4]) : null;
            let ageInDays = Infinity; // Default to infinitely old if no date
            
            if (releaseDate) {
                // Ensure timezone safety by using UTC math, or just basic timestamp math
                ageInDays = (NOW - releaseDate.getTime()) / MS_PER_DAY;
            }

            return {
                id: v[0],
                title: v[1],
                creator: v[2],
                tags: v[3].split(','),
                searchString: `${v[1]} ${v[2]} ${v[3]}`.toLowerCase(),
                releaseDate: releaseDate,
                ageInDays: ageInDays,
                displayDate: releaseDate ? releaseDate.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : 'Unknown Date'

        let activeTagFilter = '';

        let ytPlayer = null;
        let watchTrackerInterval = null;
        let currentWatchTime = 0; // seconds actual watched
        let focusTimerInterval = null;
        let focusTimeRemaining = 1500; // 25 mins
        
        // AI Vector Profile
        let userVector = {
            creators: {},
            tags: {},
            interactedIds: new Set(),
            totalRatings: 0
        };
        
        // --- PRODUCTIVITY FEATURES ---
        
        function toggleFocusTimer() {
            const display = document.getElementById('focus-timer-display');
            if (focusTimerInterval) {
                clearInterval(focusTimerInterval);
                focusTimerInterval = null;
                display.classList.remove('text-green-400');
            } else {
                display.classList.add('text-green-400');
                focusTimerInterval = setInterval(() => {
                    if (focusTimeRemaining > 0) focusTimeRemaining--;
                    else { clearInterval(focusTimerInterval); alert("Focus session complete!"); focusTimeRemaining = 1500; }
                    
                    const m = Math.floor(focusTimeRemaining / 60).toString().padStart(2, '0');
                    const s = (focusTimeRemaining % 60).toString().padStart(2, '0');
                    display.innerText = `${m}:${s}`;
                }, 1000);
            }
        }
        
        function injectTimestamp() {
            if (ytPlayer && ytPlayer.getCurrentTime) {
                const time = Math.floor(ytPlayer.getCurrentTime());
                const m = Math.floor(time / 60);
                const s = (time % 60).toString().padStart(2, '0');
                const notes = document.getElementById('theater-notes');
                notes.value += `\n[${m}:${s}] - `;
                notes.focus();
            }
        }

        // --- PROCEDURAL GENERATION ---
        
        // Setup Favicon using SVG string
        function setupFavicon() {
            const svgContent = document.getElementById('app-logo').outerHTML
                .replace('class="hidden"', '')
                .replace('xmlns="http://www.w3.org/2000/svg"', 'xmlns="http://www.w3.org/2000/svg" width="100" height="100"');
            const encoded = encodeURIComponent(svgContent);
            document.getElementById('favicon').href = `data:image/svg+xml,${encoded}`;
            document.getElementById('logo-container').innerHTML = svgContent;
        }

        // Generate safe, readable background color based on string hash
        function getStringColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash) % 360;
            // Saturation 60-80%, Lightness 20-35% for contrast with white text
            const s = 60 + (Math.abs(hash) % 20);
            const l = 20 + (Math.abs(hash) % 15);
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // --- AI & RECOMMENDATION LOGIC ---

        function computeUserVector() {
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            userVector = { creators: {}, tags: {}, interactedIds: new Set(), totalRatings: history.length };
            const now = Date.now();
            
            history.forEach((entry) => {
                userVector.interactedIds.add(entry.id);
                
                // Time Decay: Older ratings impact less. Half-life of about 14 days.
                const ageDays = (now - new Date(entry.timestamp).getTime()) / (1000 * 60 * 60 * 24);
                const decayFactor = Math.max(0.1, Math.exp(-ageDays / 14)); 
                
                let impact = (entry.rating || 0);
        
                // TELEMETRY: Watch Time integration. Never penalize, only boost.
                if (entry.watchSeconds && entry.watchSeconds > 120) {
                    impact += (entry.watchSeconds / 300); // Massive affinity boost for long watches
                }
                
                impact *= decayFactor;
                
                userVector.creators[entry.creator] = (userVector.creators[entry.creator] || 0) + (impact * 2.0);
                entry.tags.forEach(tag => {
                    userVector.tags[tag] = (userVector.tags[tag] || 0) + (impact * 1.0);
                });
            });
        
            updateAlgoStatus();
            if(!document.getElementById('dashboard-modal').classList.contains('hidden')) renderDashboardStats();
        }

        function updateAlgoStatus() {
            const ind = document.getElementById('algo-indicator');
            const status = document.getElementById('algo-status');
            
            if (userVector.totalRatings === 0) {
                ind.className = "w-1.5 h-1.5 bg-industrial-700 rounded-full mr-2";
                status.innerText = "Engine Idle";
            } else {
                ind.className = "w-1.5 h-1.5 bg-industrial-accent rounded-full mr-2 shadow-[0_0_8px_rgba(14,165,233,0.8)]";
                status.innerText = `Matrix Active (${userVector.totalRatings} nodes)`;
            }
        }

        // --- UI RENDERING ---

        function extractTopTags() {
            const tagSet = new Set();
            videoDB.forEach(v => v.tags.forEach(t => tagSet.add(t)));
            const container = document.getElementById('tag-filters');
            
            // Create "All" pill
            let html = `<button onclick="setTagFilter('')" class="shrink-0 px-4 py-1.5 rounded-full text-xs font-mono transition-colors border ${activeTagFilter === '' ? 'bg-white text-black border-white' : 'bg-industrial-800/50 text-industrial-400 border-white/10 hover:bg-industrial-800'}">All Matrix</button>`;
            
            // Create pills for top 15 tags randomly to keep UI clean, or popular ones
            Array.from(tagSet).sort().slice(0, 20).forEach(tag => {
                const isActive = activeTagFilter === tag;
                html += `<button onclick="setTagFilter('${tag}')" class="shrink-0 px-4 py-1.5 rounded-full text-xs font-mono transition-colors border ${isActive ? 'bg-industrial-accent text-white border-industrial-accent' : 'bg-industrial-800/50 text-industrial-400 border-white/10 hover:bg-industrial-800'}">${tag}</button>`;
            });
            container.innerHTML = html;
        }

        function setTagFilter(tag) {
            activeTagFilter = tag;
            currentDisplayCount = 12;
            extractTopTags(); // Re-render active state
            renderFeed(true);
        }

        function handleSearch(val) {
            activeSearchQuery = val.toLowerCase();
            currentDisplayCount = 12;
            renderFeed(true);
        }

        function forceRefresh() {
            currentDisplayCount = 12;
            renderFeed(true);
        }

        function renderFeed(reset = false) {
            const grid = document.getElementById('video-grid');
            if (reset) {
                grid.innerHTML = '';
                document.documentElement.scrollTop = 0;
            }

            // 1. Filter
            let view = videoDB.filter(v => {
                const matchesSearch = !activeSearchQuery || v.searchString.includes(activeSearchQuery);
                const matchesTag = !activeTagFilter || v.tags.includes(activeTagFilter);
                return matchesSearch && matchesTag;
            });

            // 2. Score Calculation with Exploration & Watch Again Integration
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            
            view.forEach(v => {
                let score = Math.random() * 1.5; 
                v._isNew = !userVector.interactedIds.has(v.id);
                v._isWatchAgain = false;
            
                if (userVector.totalRatings > 0) {
                    const creatorScore = userVector.creators[v.creator] || 0;
                    let tagScore = 0;
                    v.tags.forEach(t => tagScore += (userVector.tags[t] || 0));
                    score += creatorScore + (tagScore / Math.max(1, v.tags.length));
            
                    if (v._isNew) {
                        score += 5.0; // Base boost for unseen content
                    } else {
                        // SEEN VIDEO LOGIC: Massive base penalty
                        score -= 100; 
                        
                        const pastEntry = history.find(h => h.id === v.id);
                        if (pastEntry && (pastEntry.rating > 0 || pastEntry.watchSeconds > 300)) {
                            if (Math.random() < 0.15) {
                                score += 150; // Skyrocket past penalty
                                v._isWatchAgain = true;
                            }
                        }
                    }
                }

                // --- TEMPORAL BOOST LOGIC ---
                // Only prioritize fresh content if the user hasn't seen it yet
                if (v._isNew) {
                    if (v.ageInDays <= 7) {
                        score += 25.0; // "Fresh": Massive priority to force it to the top
                    } else if (v.ageInDays <= 180) {
                        score += 8.0;  // "New": Mild priority
                    }
                }

                v._tempScore = score;
            });

            // Initial sort by raw algorithmic power
            view.sort((a, b) => b._tempScore - a._tempScore);

            // 3. DIVERSITY SPREADER: Prevent echo chambers
            let diversifiedView = [];
            let creatorCounts = {};

            while(view.length > 0) {
                let bestIdx = 0;
                let bestScore = -Infinity;

                // Scan the top 6 candidates to find the one that maximizes score while minimizing repetition
                const searchWindow = Math.min(view.length, 6);
                for(let i = 0; i < searchWindow; i++) {
                    const candidate = view[i];
                    const recentCount = creatorCounts[candidate.creator] || 0;
                    
                    // Heavy penalty for every video by the same creator already placed in this batch
                    const penalty = recentCount * 3.5; 
                    const adjustedScore = candidate._tempScore - penalty;

                    if(adjustedScore > bestScore) {
                        bestScore = adjustedScore;
                        bestIdx = i;
                    }
                }

                const selected = view.splice(bestIdx, 1)[0];
                diversifiedView.push(selected);
                creatorCounts[selected.creator] = (creatorCounts[selected.creator] || 0) + 1;
            }

            // 4. Render Batch with Enhanced UI
            const batch = diversifiedView.slice(0, currentDisplayCount);
            
            batch.forEach((v, idx) => {
                if (!document.getElementById(`vid-${v.id}`)) {
                    const card = document.createElement('div');
                    card.id = `vid-${v.id}`;
                    card.className = "video-card bg-industrial-900 rounded-2xl overflow-hidden cursor-pointer group border border-white/5 flex flex-col relative";
                    card.onclick = () => openTheater(v);
                    
                    const creatorColor = getStringColor(v.creator);
                    
                    // Intelligent Badges
                    let badgeHtml = '';
                    if (v._isWatchAgain) {
                        badgeHtml = `<div class="absolute top-2 right-2 z-10 bg-blue-600/90 backdrop-blur text-white px-2 py-1 rounded text-[9px] font-mono font-bold uppercase shadow-lg border border-white/20">↺ Watch Again</div>`;
                    } else if (userVector.totalRatings > 0) {
                        if (v._isNew && v._tempScore > 5) {
                            badgeHtml = `<div class="absolute top-2 right-2 z-10 bg-purple-500/90 backdrop-blur text-white px-2 py-1 rounded text-[9px] font-mono font-bold uppercase shadow-lg border border-white/20">Discovery</div>`;
                        } else if (v._tempScore > 6 && !v._isNew) {
                            badgeHtml = `<div class="absolute top-2 right-2 z-10 bg-industrial-accent/90 backdrop-blur text-white px-2 py-1 rounded text-[9px] font-mono font-bold uppercase shadow-lg border border-white/20">High Match</div>`;
                        }
                    }

                    card.innerHTML = `
                        ${badgeHtml}
                        <div class="relative aspect-video bg-black overflow-hidden">
                            <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition duration-700" 
                                 onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'">
                            
                            ${!v._isNew ? `<div class="absolute bottom-0 left-0 right-0 h-1 bg-industrial-800"><div class="h-full bg-industrial-400 w-full"></div></div>` : ''}

                            <div class="absolute inset-0 bg-gradient-to-t from-industrial-900 via-transparent to-transparent opacity-90"></div>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="w-12 h-12 bg-industrial-accent/90 backdrop-blur rounded-full flex items-center justify-center shadow-xl shadow-industrial-accent/30 translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                                    <svg class="w-5 h-5 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-bold text-[15px] leading-tight mb-3 text-industrial-50 group-hover:text-industrial-accent transition-colors line-clamp-2">${v.title}</h3>
                            <div class="mt-auto">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shadow-inner" style="background-color: ${creatorColor};">${v.creator.charAt(0).toUpperCase()}</span>
                                    <div class="flex flex-col overflow-hidden">
                                        <span class="text-xs text-industrial-300 font-medium truncate leading-tight">${v.creator}</span>
                                        <span class="text-[10px] text-industrial-500 font-mono tracking-wide truncate">${v.displayDate}</span>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-1.5">
                                    ${v.tags.slice(0,3).map(t => `<span class="px-2 py-0.5 bg-industrial-800/80 hover:bg-industrial-700 rounded text-[10px] text-industrial-300 font-mono border border-white/5 transition-colors">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                    setTimeout(() => card.classList.add('loaded'), 50 * (idx % 12));
                }
            });

            const anchor = document.getElementById('scroll-anchor');
            if (currentDisplayCount < diversifiedView.length) {
                anchor.classList.remove('opacity-0');
            } else {
                anchor.classList.add('opacity-0');
            }
        }

        // --- PRODUCTIVITY: THEATER & NOTES ---

        function openTheater(video) {
            activeTheaterVideo = video;
            const modal = document.getElementById('theater-modal');
            const title = document.getElementById('theater-title');
            const notes = document.getElementById('theater-notes');
            
            document.body.style.overflow = 'hidden';
            title.innerText = video.title;
            
            // Reset Telemetry
            currentWatchTime = 0;
            if (watchTrackerInterval) clearInterval(watchTrackerInterval);
            
            // Initialize YouTube API Player
            if (ytPlayer) {
                ytPlayer.destroy();
            }
            ytPlayer = new YT.Player('theater-frame', {
                videoId: video.id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: {
                    'onStateChange': (event) => {
                        // State 1 is "Playing"
                        if (event.data == 1) {
                            watchTrackerInterval = setInterval(() => { currentWatchTime++; }, 1000);
                        } else {
                            clearInterval(watchTrackerInterval);
                        }
                    }
                }
            });
            
            notes.value = localStorage.getItem(`newtube_notes_${video.id}`) || '';
        
            // RETAIN RATING STATE UI
            const btns = document.querySelectorAll('.t-rate-btn');
            btns.forEach(b => b.classList.remove('ring-2', 'ring-industrial-accent', 'bg-industrial-800', 'scale-110'));
            
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            const pastEntry = history.find(h => h.id === video.id);
            
            if (pastEntry && pastEntry.rating !== undefined) {
                let btnIndex = 1; // Neutral
                if(pastEntry.rating < 0) btnIndex = 0;
                if(pastEntry.rating > 0) btnIndex = 2;
                btns[btnIndex].classList.add('ring-2', 'ring-industrial-accent', 'scale-110', 'bg-industrial-800');
            }
        
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        
        function closeTheater() {
            const modal = document.getElementById('theater-modal');
            saveNotes();
            
            // Log Watch Time silently if they watched more than 10 seconds but didn't rate
            if (currentWatchTime > 10) {
                logTelemetry(activeTheaterVideo, null); // Null means don't change existing rating
            }
        
            if (ytPlayer) ytPlayer.destroy();
            ytPlayer = null;
            clearInterval(watchTrackerInterval);
            
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            activeTheaterVideo = null;
            document.body.style.overflow = '';
        }

        function saveNotes() {
            if (!activeTheaterVideo) return;
            const text = document.getElementById('theater-notes').value;
            if (text.trim() === '') {
                localStorage.removeItem(`newtube_notes_${activeTheaterVideo.id}`);
            } else {
                localStorage.setItem(`newtube_notes_${activeTheaterVideo.id}`, text);
            }
            
            // Visual feedback
            const btn = document.querySelector('button[onclick="saveNotes()"]');
            const oldTxt = btn.innerText;
            btn.innerText = "Saved ✓";
            btn.classList.add('text-green-400');
            setTimeout(() => {
                btn.innerText = oldTxt;
                btn.classList.remove('text-green-400');
            }, 2000);
        }

        function theaterRate(rating) {
            if (!activeTheaterVideo) return;
        
            const btns = document.querySelectorAll('.t-rate-btn');
            btns.forEach(b => b.classList.remove('ring-2', 'ring-industrial-accent', 'scale-110'));
            
            let btnIndex = 1;
            if(rating < 0) btnIndex = 0;
            if(rating > 0) btnIndex = 2;
            btns[btnIndex].classList.add('ring-2', 'ring-industrial-accent', 'scale-110', 'bg-industrial-800');
        
            logTelemetry(activeTheaterVideo, rating);
        }

        // Master function to handle writing interaction history
        function logTelemetry(video, newRating) {
            let history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            const existingIndex = history.findIndex(h => h.id === video.id);
            
            let entry = {
                id: video.id,
                title: video.title,
                creator: video.creator,
                tags: video.tags,
                rating: 0,
                watchSeconds: 0,
                timestamp: new Date().toISOString()
            };
        
            if (existingIndex > -1) {
                entry = history[existingIndex];
                history.splice(existingIndex, 1); // remove old to place at top
            }
        
            // Update fields
            if (newRating !== null) entry.rating = newRating;
            entry.watchSeconds = (entry.watchSeconds || 0) + currentWatchTime;
            currentWatchTime = 0; // Reset so we don't double-count on close
        
            history.unshift(entry);
            if (history.length > 500) history.length = 500;
            
            localStorage.setItem('newtube_nexus_history', JSON.stringify(history));
            computeUserVector();
        }

        // --- DASHBOARD & STATS ---

        function toggleDashboard() {
            const modal = document.getElementById('dashboard-modal');
            if (modal.classList.contains('hidden')) {
                renderDashboardStats();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderDashboardStats() {
            const history = JSON.parse(localStorage.getItem('newtube_nexus_history') || '[]');
            const historyList = document.getElementById('history-list');
            
            // Render History Items
            historyList.innerHTML = history.slice(0, 20).map(item => `
                <div class="p-3 bg-industrial-950 rounded-lg border border-white/5 flex items-center justify-between group">
                    <div class="overflow-hidden pr-4">
                        <p class="text-xs text-white truncate">${item.title}</p>
                        <p class="text-[10px] font-mono text-industrial-400 uppercase">${item.creator} • ${new Date(item.timestamp).toLocaleDateString()}</p>
                    </div>
                    <div class="text-xl shrink-0 opacity-80 group-hover:opacity-100 transition-opacity">
                        ${item.rating > 0 ? '🔥' : (item.rating < 0 ? '👎' : '😐')}
                    </div>
                </div>
            `).join('');

            if (history.length === 0) return;

            // Render Tag Bars
            const sortedTags = Object.entries(userVector.tags)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);
            
            const maxTag = sortedTags[0]?.[1] || 1;

            document.getElementById('stats-tags').innerHTML = sortedTags.map(([tag, score]) => {
                const pct = Math.max(5, (score / maxTag) * 100);
                return `
                <div>
                    <div class="flex justify-between text-[10px] font-mono text-industrial-400 mb-1">
                        <span>${tag}</span>
                        <span>${score.toFixed(1)}w</span>
                    </div>
                    <div class="h-1.5 w-full bg-industrial-950 rounded-full overflow-hidden">
                        <div class="h-full bg-industrial-accent stat-bar-fill rounded-full" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            }).join('');

            // Render Creator Bars
            const sortedCreators = Object.entries(userVector.creators)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 4);
            
            const maxCreator = sortedCreators[0]?.[1] || 1;

            document.getElementById('stats-creators').innerHTML = sortedCreators.map(([creator, score]) => {
                const pct = Math.max(5, (score / maxCreator) * 100);
                return `
                <div>
                    <div class="flex justify-between text-[10px] font-mono text-industrial-400 mb-1">
                        <span>${creator}</span>
                    </div>
                    <div class="h-1.5 w-full bg-industrial-950 rounded-full overflow-hidden">
                        <div class="h-full bg-purple-500 stat-bar-fill rounded-full" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function clearHistory() {
            if (confirm('Wipe neural data? This resets recommendations but keeps your local notes.')) {
                localStorage.removeItem('newtube_nexus_history');
                computeUserVector();
                renderDashboardStats();
                forceRefresh();
            }
        }

        // --- INIT & EVENT LISTENERS ---

        // Infinite Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentDisplayCount < videoDB.length) {
                currentDisplayCount += 8;
                renderFeed();
            }
        }, { threshold: 0.1 });

        // Escape to close theater/dashboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('theater-modal').classList.contains('hidden')) {
                    closeTheater();
                } else if (!document.getElementById('dashboard-modal').classList.contains('hidden')) {
                    toggleDashboard();
                }
            }
        });

        window.onload = () => {
            setupFavicon();
            computeUserVector();
            extractTopTags();
            renderFeed(true);
            observer.observe(document.getElementById('scroll-anchor'));
        };

    </script>
